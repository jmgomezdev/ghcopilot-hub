name: Publish Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        required: false
        default: latest
      dry_run:
        description: Run npm publish as dry-run
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate hub structure
        run: npm run validate:hub

      - name: Run tests
        run: npm test

      - name: Check published package contents
        run: npm run pack:check

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --tag "${{ inputs.tag }}" --dry-run
          else
            npm publish --tag "${{ inputs.tag }}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
