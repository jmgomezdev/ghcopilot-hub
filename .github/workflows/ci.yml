name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-node:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate hub structure
        run: npm run validate:hub

      - name: Run tests
        run: npm test

      - name: Check published package contents
        run: npm run pack:check

  validate-bun:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate hub structure
        run: bun run validate:hub

      - name: Run tests
        run: bun run test

      - name: Check published package contents
        run: bun pm pack --quiet
